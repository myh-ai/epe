{%- if site.comments.provider == "giscus" -%}
<section class="comments-wrap reveal">
  <div class="sec-head"><span class="lbl">Leave a note</span><span class="line"></span></div>
  <p class="comments-intro">Thoughts, disagreements, a line that stayed with you — leave them below. Each note is saved under this essay.</p>
  <div class="giscus"></div>
  <script src="https://giscus.app/client.js"
    data-repo="{{ site.comments.giscus.repo }}"
    data-repo-id="{{ site.comments.giscus.repo_id }}"
    data-category="{{ site.comments.giscus.category }}"
    data-category-id="{{ site.comments.giscus.category_id }}"
    data-mapping="pathname"
    data-strict="0"
    data-reactions-enabled="1"
    data-emit-metadata="0"
    data-input-position="top"
    data-theme="dark_dimmed"
    data-lang="en"
    crossorigin="anonymous"
    async>
  </script>
</section>
{%- endif -%}
